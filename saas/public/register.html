<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — ListingBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="logo">ListingBot</a>
    <h2>Create your account</h2>
    <div id="error" class="error-msg hidden"></div>
    <form id="registerForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@email.com" required>
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
      <button type="submit" class="btn-primary btn-block" id="submitBtn">Create Account</button>
    </form>
    <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Creating...'; btn.disabled = true;
      const err = document.getElementById('error');
      err.classList.add('hidden');

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('email', data.email);
        window.location.href = '/dashboard.html';
      } else {
        err.textContent = data.error; err.classList.remove('hidden');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
